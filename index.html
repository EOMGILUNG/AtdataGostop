  <body>
    <main id="app" class="game-screen"></main>
    <!-- Persistent host for the captured-pile overlay. Lives outside #app
         so it is NOT torn down on every render(), which would re-trigger
         the slide-in animation and cause flicker during gameplay. -->
    <div id="captured-view-root"></div>
    <script>
      // Local dev convenience: if someone double-clicks index.html, bounce to
      // the dev server. On real hosts (http/https) this does nothing.
      if (location.protocol === "file:") {
        location.replace("http://localhost:4174/");
      }
    </script>
    <script type="module" src="./src/main.js?v=20260513-81"></script>
